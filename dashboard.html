<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil - Huellitas</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #ffe29f, #ffa99f);
}

.container {
    margin-top: 100px;
}

img {
    border-radius: 50%;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🐾 Bienvenido</h1>

    <p id="nombre"></p>
    <img id="foto" width="100">

    <br><br>
    <button onclick="cerrarSesion()">Cerrar sesión</button>
</div>

<script>

const usuario = JSON.parse(localStorage.getItem("sesion"));

if(!usuario){
    window.location.href = "index.html";
}

document.getElementById("nombre").textContent = usuario.user;
document.getElementById("foto").src = usuario.foto;

function cerrarSesion(){
    localStorage.removeItem("sesion");
    window.location.href = "index.html";
}

</script>

</body>
</html>
