<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#5f9d63">
    <title>Huellitas sin conexion</title>
    <style>
        :root { color-scheme: light dark; font-family: Arial, sans-serif; }
        * { box-sizing: border-box; }
        body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: #f2f8f2; color: #25352a; }
        main { width: min(520px, 100%); padding: 30px; border: 1px solid rgba(47, 107, 67, .24); border-radius: 8px; background: #fff; text-align: center; box-shadow: 0 18px 45px rgba(38, 51, 44, .12); }
        img { width: 92px; height: 92px; object-fit: cover; border-radius: 50%; }
        h1 { margin: 16px 0 8px; }
        p { line-height: 1.6; color: #5d6d62; }
        button { min-height: 44px; border: 0; border-radius: 8px; padding: 11px 18px; color: #fff; background: #5f9d63; font: inherit; font-weight: 800; cursor: pointer; }
        @media (prefers-color-scheme: dark) { body { background: #0e1711; color: #f4f8f5; } main { background: #17231b; } p { color: #c3cec6; } }
    </style>
</head>
<body>
    <main>
        <img src="assets/imagenes/logo.png" alt="Logo de Huellitas">
        <h1>Huellitas esta descansando</h1>
        <p>No hay conexion en este momento. Las pantallas que ya visitaste pueden seguir disponibles y tus avances locales permanecen en este dispositivo.</p>
        <button type="button" onclick="location.reload()">Intentar de nuevo</button>
    </main>
</body>
</html>
